# "A RODADA" — pôster diário do Bolão Miha 2026 (TAREFA SEPARADA da landing page).
#
# Toda manhã (pôster pronto antes das 7h BRT): monta um PNG com os resultados da última
# rodada + curiosidades + os jogos do dia (horário de SP) e publica num link fixo:
#   https://raw.githubusercontent.com/paulocrepaldi81/bolao-miha-2026/rodada/hoje.png
# Você abre esse link no celular e encaminha pro grupo do WhatsApp.
#
# É independente do robô da landing: workflow próprio, pasta a-rodada/, e publica numa
# branch dedicada ("rodada", force-push) — nunca toca na main nem na landing page.
name: A Rodada (pôster diário)

on:
  # GATILHO PRINCIPAL: roda LOGO APÓS o robô da landing ("Atualiza placar"), que dispara a cada
  # 5 min via pinger externo (cron-job.org) e é confiável. O cron NATIVO do GitHub está MORTO
  # pra este repo (nenhuma run agendada disparou nunca), então não dá pra confiar no schedule.
  # O passo "guard" garante publicar só 1x/dia, na janela da manhã (06–09 BRT).
  workflow_run:
    workflows: ["Atualiza placar"]
    types: [completed]
  schedule:
    - cron: "*/15 9-12 * * *"   # backup, caso o cron do GitHub volte a funcionar
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: a-rodada
  cancel-in-progress: false

jobs:
  poster:
    runs-on: ubuntu-latest
    steps:
      - name: Publicar agora? (1x/dia na janela da manhã; manual sempre)
        id: guard
        run: |
          TODAY=$(date -u +%F)
          HOUR=$((10#$(date -u +%H)))   # hora UTC em base 10 (evita erro com 08/09)
          LASTDATE=""
          if git clone --depth 1 --branch rodada --single-branch "https://github.com/${GITHUB_REPOSITORY}.git" /tmp/rcheck >/dev/null 2>&1; then
            LASTDATE=$(git -C /tmp/rcheck log -1 --format=%cd --date=format:%F 2>/dev/null || echo "")
          fi
          PUB=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PUB=true                                                       # manual: sempre gera
          elif [ "$LASTDATE" != "$TODAY" ] && [ "$HOUR" -ge 9 ] && [ "$HOUR" -lt 13 ]; then
            PUB=true                                                       # automático: 1x/dia, 09–12 UTC (06–09 BRT)
          fi
          if [ "$PUB" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Vai gerar o pôster de $TODAY (último: ${LASTDATE:-nenhum}, ${HOUR}h UTC, evento ${{ github.event_name }})."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Pulando (último: ${LASTDATE:-nenhum}, hoje $TODAY, ${HOUR}h UTC, evento ${{ github.event_name }})."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Instalar Playwright + Pillow + fonte de emoji
        if: steps.guard.outputs.skip != 'true'
        run: |
          pip install playwright pillow
          python -m playwright install --with-deps chromium
          sudo apt-get install -y fonts-noto-color-emoji

      - name: Gerar o pôster (hoje.png)
        if: steps.guard.outputs.skip != 'true'
        working-directory: a-rodada
        run: python gen_rodada.py

      - name: Publicar no link fixo (branch "rodada", force-push)
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f a-rodada/hoje.png ]; then echo "Nenhum pôster novo gerado (torneio encerrado?) — nada a publicar."; exit 0; fi
          mkdir -p /tmp/pub && cp a-rodada/hoje.png /tmp/pub/hoje.png
          cd /tmp/pub
          git init -q -b rodada
          git config user.name "bolao-bot"
          git config user.email "actions@github.com"
          git add hoje.png
          git commit -q -m "A Rodada — pôster de $(date -u +%F)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" rodada
          echo "Pôster publicado em: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/rodada/hoje.png"
