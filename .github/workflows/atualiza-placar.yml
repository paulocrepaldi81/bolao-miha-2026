# Robô do Bolão Miha 2026 — busca placares e republica a landing page.
#
# Cada execução:
#   1. fetch_results.py  → ESPN (fonte primária, near-real-time) → results.csv
#   2. cross_check.py    → football-data.org (2ª fonte) confere os encerrados
#   3. fetch_facts.py    → categorias extras (1º expulso/gol contra via ESPN; artilharia)
#   4. build_data.py     → repontua tudo e gera landing-page/data.json
#   5. commit + deploy-pages → publica no GitHub Pages
#   6. alerta            → e-mail automático se as 2 fontes divergirem
#
# Secret necessário: FOOTBALL_DATA_TOKEN (https://www.football-data.org) — usado na
# conferência e na artilharia. A ESPN não precisa de chave.
name: Atualiza placar

on:
  # GATILHO PRINCIPAL: pinger externo (cron-job.org via workflow_dispatch), a cada ~3 min.
  # O agendador do GitHub abaixo é só REDE DE SEGURANÇA (timing irregular) caso o pinger
  # caia — por isso esparso, pra não empilhar runs em cima do pinger.
  schedule:
    - cron: "*/15 0-6,15-23 * * *"   # backup a cada 15 min na janela dos jogos (12h-04h BRT)
    - cron: "0 9,12 * * *"           # 2 toques leves de manhã (BRT)
  # Gatilho cravado: pinger externo (cron-job.org) e o botão "Run workflow".
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write          # publicar no GitHub Pages
  id-token: write       # deploy-pages

# cancel-in-progress:false → os runs ficam EM FILA e rodam UM DE CADA VEZ. Como nunca há
# dois ativos ao mesmo tempo, é IMPOSSÍVEL dois pushes colidirem (a raiz da corrida).
# Combinado com o push resiliente abaixo, a publicação fica à prova de erro.
concurrency:
  group: atualiza-placar
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install openpyxl

      - name: Buscar placares oficiais (ESPN — fonte primária)
        working-directory: engine
        run: python fetch_results.py

      - name: Conferir numa 2ª fonte independente (football-data.org)
        working-directory: engine
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python cross_check.py

      - name: Apurar categorias extras (1º expulso/gol contra via ESPN, artilharia, parciais)
        working-directory: engine
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python fetch_facts.py

      - name: Repontuar e gerar data.json
        working-directory: engine
        # Dados REAIS (88 apostas) — sem --placeholder. O site mostra tudo de verdade.
        run: python build_data.py --from-json --out ../landing-page/data.json

      # Auditoria automática: se o data.json vier estruturalmente quebrado/vazio, FALHA
      # aqui (→ e-mail do GitHub) ANTES de commitar/publicar — a última versão boa fica
      # no ar. Não publicamos dado ruim.
      - name: Validar dados gerados (auditoria automática)
        working-directory: engine
        run: python validate_data.py

      # Decide se a divergência é NOVA (compara a "assinatura" das discrepâncias, sem o
      # timestamp). Só marca NEW_DIVERGENCE=true quando muda → 1 e-mail por divergência.
      - name: Avaliar divergência entre fontes
        working-directory: engine
        run: |
          python - <<'PY'
          import json, os
          def load(p, d):
              try: return json.load(open(p, encoding="utf-8"))
              except Exception: return d
          c = load("data/cross_check.json", {})
          st = load("data/alert_state.json", {"last_sig": ""})
          if c.get("status") == "divergencia":
              sig = json.dumps(sorted((d.get("match_id"), d.get("primaria"), d.get("secundaria"))
                                      for d in c.get("discrepancias", c.get("discrepancies", []))), ensure_ascii=False)
          else:
              sig = ""
          new = (c.get("status") == "divergencia" and sig != st.get("last_sig", ""))
          if sig != st.get("last_sig", ""):
              json.dump({"last_sig": sig}, open("data/alert_state.json", "w", encoding="utf-8"), ensure_ascii=False)
          env = os.environ.get("GITHUB_ENV")
          if env:
              open(env, "a").write("NEW_DIVERGENCE=%s\n" % ("true" if new else "false"))
          print("status:", c.get("status"), "| divergência nova?", new)
          PY

      - name: Versionar dados (commit + push best-effort — nunca derruba o run)
        run: |
          git config user.name "bolao-bot"
          git config user.email "actions@github.com"
          FILES="engine/data/results.csv engine/data/history.json engine/data/facts.json engine/data/facts_live.json engine/data/cross_check.json engine/data/alert_state.json landing-page/data.json"
          git add $FILES
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
            exit 0
          fi
          git commit -m "🤖 placar atualizado ($(date -u +%H:%M) UTC)"
          # Se o remoto andou (pushes concorrentes), re-empilha NOSSOS dados frescos e tenta de novo.
          for i in 1 2 3 4 5 6 7 8; do
            if git push; then echo "push ok (tentativa $i)"; exit 0; fi
            echo "push rejeitado — re-empilhando sobre o remoto (tentativa $i)"
            git fetch origin main
            git reset --soft origin/main
            git add $FILES
            if git diff --cached --quiet; then echo "remoto já tem dados equivalentes — ok."; exit 0; fi
            git commit -m "🤖 placar atualizado ($(date -u +%H:%M) UTC)"
            sleep 3
          done
          # IMPORTANTE: NÃO falha o run. O site ao vivo é publicado pelo deploy-pages (abaixo),
          # que não depende do git push. Um push perdido se auto-corrige no próximo run.
          echo "::warning::push não concluiu após as tentativas; o site será publicado pelo deploy-pages mesmo assim. Sem alarme."
          exit 0

      # Publica o site no GitHub Pages a CADA rodada — assim o data.json fica
      # fresco na própria origem do site (sem depender do cache de 5 min do raw).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing-page
      - id: deployment
        uses: actions/deploy-pages@v4

      # ALERTA: roda DEPOIS de publicar (o site sempre sai no ar, já com o aviso de
      # divergência) e SÓ quando a conferência MUDOU nesta rodada (env CC_CHANGED).
      # Assim uma divergência real manda 1 e-mail quando aparece — não um a cada run.
      # Some sozinho quando as fontes voltam a bater (a conferência muda p/ "ok").
      - name: Alertar se houver divergência NOVA entre fontes
        if: env.NEW_DIVERGENCE == 'true'
        working-directory: engine
        run: |
          python - <<'PY'
          import json, sys, os
          p = "data/cross_check.json"
          if not os.path.exists(p):
              sys.exit(0)
          c = json.load(open(p, encoding="utf-8"))
          if c.get("status") == "divergencia":
              print("⛔ DIVERGÊNCIA NOVA ENTRE FONTES — confira os placares:")
              for d in c.get("discrepancies", []):
                  print(f"   {d['match_id']} {d['teams']}: {d.get('primaria')} ≠ {d.get('secundaria')}")
              sys.exit(1)   # falha de propósito → 1 e-mail de alerta do GitHub
          print(f"✓ Conferência atualizada: {c.get('agree')}/{c.get('compared')} batem em 2 fontes.")
          PY
