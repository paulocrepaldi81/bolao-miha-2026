# Robô do Bolão Miha 2026 — busca placares e republica a landing page.
#
# Roda a cada 20 minutos durante a Copa (11/jun–19/jul). Cada execução:
#   1. fetch_results.py  → consulta a API e atualiza engine/data/results.csv
#   2. build_data.py     → repontua tudo e gera landing-page/data.json
#   3. commit+push       → o Netlify detecta e republica o site (~30s)
#
# Setup necessário (uma vez): em Settings → Secrets and variables → Actions,
# criar o secret FOOTBALL_DATA_TOKEN com a chave de https://www.football-data.org
name: Atualiza placar

on:
  # Gatilho via workflow_dispatch — acionado pelo PINGER externo (cron-job.org)
  # a cada 10 min, de forma confiável. Também roda pelo botão "Run workflow".
  # (O agendador nativo do GitHub foi removido por ser irregular p/ alta frequência.)
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write          # publicar no GitHub Pages
  id-token: write       # deploy-pages

concurrency:
  group: atualiza-placar
  cancel-in-progress: true

jobs:
  atualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install openpyxl

      - name: Buscar placares oficiais
        working-directory: engine
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python fetch_results.py

      - name: Apurar categorias extras (cartões, gols contra, artilharia, parciais)
        working-directory: engine
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}   # lances (api-football.com)
        run: python fetch_facts.py

      - name: Repontuar e gerar data.json
        working-directory: engine
        # --placeholder mantém o aviso de protótipo no site enquanto as apostas
        # são exemplos. Remover quando as 84 planilhas reais forem carregadas.
        run: python build_data.py --from-json --placeholder --out ../landing-page/data.json

      - name: Versionar dados (commit se houve mudança)
        run: |
          git config user.name "bolao-bot"
          git config user.email "actions@github.com"
          git add engine/data/results.csv engine/data/history.json engine/data/facts.json engine/data/facts_live.json landing-page/data.json
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "🤖 placar atualizado ($(date -u +%H:%M) UTC)"
            git push
          fi

      # Publica o site no GitHub Pages a CADA rodada — assim o data.json fica
      # fresco na própria origem do site (sem depender do cache de 5 min do raw).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing-page
      - id: deployment
        uses: actions/deploy-pages@v4
