# Robô do Bolão Miha 2026 — busca placares e republica a landing page.
#
# Roda a cada 20 minutos durante a Copa (11/jun–19/jul). Cada execução:
#   1. fetch_results.py  → consulta a API e atualiza engine/data/results.csv
#   2. build_data.py     → repontua tudo e gera landing-page/data.json
#   3. commit+push       → o Netlify detecta e republica o site (~30s)
#
# Setup necessário (uma vez): em Settings → Secrets and variables → Actions,
# criar o secret FOOTBALL_DATA_TOKEN com a chave de https://www.football-data.org
name: Atualiza placar

on:
  # BASE: agendador do GitHub (grátis, automático). Timing pode variar 10-40 min,
  # mas garante atualização recorrente sozinho durante toda a Copa.
  schedule:
    - cron: "*/10 0-6,15-23 * * *"   # ~a cada 10 min na janela dos jogos (12h-04h BRT)
    - cron: "0 9,12 * * *"           # 2 atualizações leves de manhã (BRT)
  # UPGRADE opcional: o pinger externo (cron-job.org) chama via workflow_dispatch
  # para timing cravado. O botão "Run workflow" também usa este gatilho.
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write          # publicar no GitHub Pages
  id-token: write       # deploy-pages

concurrency:
  group: atualiza-placar
  cancel-in-progress: true

jobs:
  atualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install openpyxl

      - name: Buscar placares oficiais
        working-directory: engine
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python fetch_results.py

      - name: Conferir placares numa 2ª fonte independente (ESPN)
        working-directory: engine
        run: python cross_check.py

      - name: Apurar categorias extras (cartões, gols contra, artilharia, parciais)
        working-directory: engine
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}   # lances (api-football.com)
        run: python fetch_facts.py

      - name: Repontuar e gerar data.json
        working-directory: engine
        # Dados REAIS (88 apostas) — sem --placeholder. O site mostra tudo de verdade.
        run: python build_data.py --from-json --out ../landing-page/data.json

      - name: Versionar dados (commit se houve mudança)
        run: |
          git config user.name "bolao-bot"
          git config user.email "actions@github.com"
          git add engine/data/results.csv engine/data/history.json engine/data/facts.json engine/data/facts_live.json engine/data/cross_check.json landing-page/data.json
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "🤖 placar atualizado ($(date -u +%H:%M) UTC)"
            git push
          fi

      # Publica o site no GitHub Pages a CADA rodada — assim o data.json fica
      # fresco na própria origem do site (sem depender do cache de 5 min do raw).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing-page
      - id: deployment
        uses: actions/deploy-pages@v4

      # ALERTA: roda DEPOIS de publicar (o site sempre sai no ar, já com o aviso
      # de divergência). Se as duas fontes discordarem num jogo encerrado, este
      # passo FALHA de propósito — e o GitHub manda e-mail automático ao dono do
      # repositório. O alerta persiste a cada rodada até alguém resolver (corrigir
      # o placar com lock=sim em results.csv).
      - name: Alertar se houver divergência entre fontes
        working-directory: engine
        run: |
          python - <<'PY'
          import json, sys, os
          p = "data/cross_check.json"
          if not os.path.exists(p):
              print("Sem relatório de conferência — ok."); sys.exit(0)
          c = json.load(open(p, encoding="utf-8"))
          if c.get("status") == "divergencia":
              print("⛔ DIVERGÊNCIA ENTRE FONTES — confira os placares:")
              for d in c.get("discrepancies", []):
                  print(f"   {d['match_id']} {d['teams']}: {d['oficial']} ≠ {d['espn']}")
              sys.exit(1)   # falha de propósito → e-mail de alerta do GitHub
          print(f"✓ Conferência ok: {c.get('agree')}/{c.get('compared')} batem em 2 fontes.")
          PY
