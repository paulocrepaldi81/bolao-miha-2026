# Publica a landing page no GitHub Pages (grátis, sem sistema de créditos).
# Espelho/seguro do site — roda a cada mudança na pasta landing-page.
name: Publica site (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "landing-page/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# MESMO grupo do atualiza-placar.yml: como os dois publicam no ambiente github-pages, precisam
# compartilhar o grupo pra NUNCA rodar ao mesmo tempo (fim das colisões "deploy failed in 6s").
# cancel-in-progress:false → ficam em FILA; nenhum cancela o robô no meio do trabalho.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing-page
      - id: deployment
        uses: actions/deploy-pages@v4
