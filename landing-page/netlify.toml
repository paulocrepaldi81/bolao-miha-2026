# Configuração de deploy do Netlify para o Bolão Miha 2026.
# O repositório do GitHub tem a pasta landing-page como raiz; site estático, sem build.

[build]
  publish = "."
  command = ""   # site estático: nada para compilar

# data.json NÃO pode ser cacheado — senão o placar fica "preso" entre rodadas.
[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

# HTML sempre fresco (o conteúdo dinâmico vem do data.json).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
