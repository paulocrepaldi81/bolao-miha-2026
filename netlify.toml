# Netlify — repositório na RAIZ do projeto (engine + landing-page + robô).
# O site publicado é só a pasta landing-page.

[build]
  publish = "landing-page"
  command = ""
  # ECONOMIA DE CRÉDITOS: só faz deploy se os arquivos da PÁGINA mudarem.
  # Commits do robô (placares/data.json/engine) NÃO geram deploy — o site lê o
  # placar direto do GitHub (raw.githubusercontent), sem custo de deploy.
  # (comando com exit 0 = pula o build; exit 1 = builda)
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- landing-page/index.html landing-page/app.js netlify.toml"

[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# JS também sem cache — senão jogadores veem versões velhas após atualizações
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
